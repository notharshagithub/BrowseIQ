<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrowseIQ - Browser AI Agent Dashboard</title>
    <!-- Google Fonts & Tailwind-like CSS resets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030712;
            --panel-dark: #0f172a;
            --panel-border: #1e293b;
            --text-main: #f8fafc;
            --text-mute: #94a3b8;
            --neon-cyan: #06b6d4;
            --neon-pink: #d946ef;
            --neon-green: #10b981;
            --neon-orange: #f97316;
            --neon-red: #ef4444;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Header */
        header {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--panel-border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 2rem;
            height: 2rem;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            border-radius: 0.5rem;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            position: relative;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
            to { box-shadow: 0 0 20px rgba(217, 70, 239, 0.6); }
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(to right, #ffffff, var(--text-mute));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--panel-border);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-mute);
            box-shadow: 0 0 8px var(--text-mute);
        }

        .status-dot.connected {
            background-color: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: blink 1.5s infinite alternate;
        }

        .status-dot.active {
            background-color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: blink 0.7s infinite alternate;
        }

        .status-dot.error {
            background-color: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }

        @keyframes blink {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        /* Layout Grid Containers */
        .dashboard-container {
            flex: 1;
            display: grid;
            grid-template-columns: 380px 1fr;
            height: calc(100vh - 3.5rem);
            overflow: hidden;
        }

        /* Left Side Control Panel */
        .control-panel {
            background-color: rgba(15, 23, 42, 0.6);
            border-right: 1px solid var(--panel-border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .section-card {
            background-color: var(--panel-dark);
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-mute);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-mute);
        }

        input, textarea, select {
            background-color: rgba(30, 41, 59, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
            background-color: rgba(30, 41, 59, 0.5);
        }

        textarea {
            resize: none;
            height: 120px;
            line-height: 1.4;
        }

        /* Custom Cyber Buttons */
        .btn {
            border-radius: 0.5rem;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-cyan {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            box-shadow: 0 4px 10px rgba(6, 182, 212, 0.2);
        }

        .btn-cyan:hover:not(:disabled) {
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4);
            transform: translateY(-1px);
        }

        .btn-pink {
            background: linear-gradient(135deg, #c026d3, #d946ef);
            box-shadow: 0 4px 10px rgba(217, 70, 239, 0.2);
        }

        .btn-pink:hover:not(:disabled) {
            box-shadow: 0 4px 15px rgba(217, 70, 239, 0.4);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-disconnect {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: var(--neon-red);
        }

        .btn-disconnect:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Right Side Viewer and Console Output */
        .viewer-container {
            display: grid;
            grid-template-rows: 1fr 240px;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            padding: 1rem;
            gap: 1rem;
        }

        /* Virtual Web Browser Panel */
        .browser-mockup {
            background-color: var(--panel-dark);
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .browser-toolbar {
            background-color: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid var(--panel-border);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .browser-dots {
            display: flex;
            gap: 6px;
        }

        .browser-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--panel-border);
        }

        .browser-address {
            flex: 1;
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--panel-border);
            border-radius: 0.25rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.8rem;
            color: var(--text-mute);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            max-width: 600px;
            font-family: 'JetBrains Mono', monospace;
        }

        .browser-viewport {
            flex: 1;
            position: relative;
            background-color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        .viewport-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: var(--transition);
        }

        .viewport-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: var(--text-mute);
            text-align: center;
            max-width: 300px;
        }

        .placeholder-icon {
            font-size: 3rem;
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        /* Real-Time Agent Cognitive Terminal Console */
        .terminal-panel {
            background-color: #020617;
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .terminal-header {
            background-color: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--panel-border);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-mute);
        }

        .terminal-logs {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .log-line {
            display: flex;
            gap: 0.5rem;
        }

        .log-tag-thought {
            color: var(--neon-cyan);
            font-weight: 600;
        }

        .log-tag-action {
            color: var(--neon-pink);
            font-weight: 600;
        }

        .log-tag-observation {
            color: var(--neon-green);
            font-weight: 600;
        }

        .log-tag-error {
            color: var(--neon-red);
            font-weight: 600;
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo-group">
            <div class="logo-icon"></div>
            <span class="logo-text">BrowseIQ</span>
        </div>
        <div class="status-badge" id="app-status">
            <span class="status-dot" id="status-indicator"></span>
            <span id="status-label">STANDBY</span>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="dashboard-container">
        
        <!-- Left Sidebar Controls -->
        <div class="control-panel">
            
            <!-- Connection Control Card -->
            <div class="section-card">
                <span class="section-title">🌐 Navigation Target</span>
                <div class="input-group">
                    <label for="target-url">Website URL</label>
                    <input type="text" id="target-url" placeholder="google.com" value="https://www.google.com">
                </div>
                <button class="btn btn-cyan" id="btn-connect">
                    <span>Connect Target Site</span>
                </button>
                <button class="btn btn-disconnect" id="btn-disconnect" disabled>
                    <span>Disconnect Session</span>
                </button>
            </div>

            <!-- Task Controller Card -->
            <div class="section-card">
                <span class="section-title">🤖 Autopilot Task</span>
                <div class="input-group">
                    <label for="task-desc">Task Instructions (Plain English)</label>
                    <textarea id="task-desc" placeholder="E.g. Type 'playwright python' into the search input and hit search."></textarea>
                </div>
                <div class="input-group">
                    <label for="task-steps">Max Step Limit</label>
                    <select id="task-steps">
                        <option value="5" selected>5 Steps</option>
                        <option value="10">10 Steps</option>
                        <option value="15">15 Steps</option>
                    </select>
                </div>
                <button class="btn btn-pink" id="btn-run-task" disabled>
                    <span>Launch Agentic Loop</span>
                </button>
            </div>
            
        </div>

        <!-- Right Side Viewer / Console Logs -->
        <div class="viewer-container">
            
            <!-- Browser Mockup Viewport -->
            <div class="browser-mockup">
                <div class="browser-toolbar">
                    <div class="browser-dots">
                        <div class="browser-dot" style="background-color: var(--neon-red)"></div>
                        <div class="browser-dot" style="background-color: var(--neon-orange)"></div>
                        <div class="browser-dot" style="background-color: var(--neon-green)"></div>
                    </div>
                    <div class="browser-address">
                        <span>🔒</span>
                        <span id="browser-address-text">about:blank</span>
                    </div>
                </div>
                <div class="browser-viewport" id="viewport-pane">
                    <div class="viewport-placeholder" id="viewport-blank">
                        <span class="placeholder-icon">🌐</span>
                        <p>No active website session. Enter a URL on the left panel to connect.</p>
                    </div>
                    <img src="" alt="Viewport Page State" class="viewport-image" id="viewport-img" style="display: none;">
                </div>
            </div>

            <!-- Cognitive Terminals -->
            <div class="terminal-panel">
                <div class="terminal-header">
                    <span>🖥️ AGENT TELEMETRY FEED</span>
                    <span id="terminal-clear" style="cursor: pointer; text-decoration: underline;">Clear</span>
                </div>
                <div class="terminal-logs" id="terminal-pane">
                    <div class="log-line">
                        <span class="log-tag-thought">[SYSTEM]</span>
                        <span>BrowseIQ interface initialized. Waiting for web host connect...</span>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Frontend logic to handle API operations -->
    <script>
        const btnConnect = document.getElementById("btn-connect");
        const btnDisconnect = document.getElementById("btn-disconnect");
        const btnRunTask = document.getElementById("btn-run-task");
        const targetUrlInput = document.getElementById("target-url");
        const taskDescInput = document.getElementById("task-desc");
        const taskStepsSelect = document.getElementById("task-steps");
        
        const statusIndicator = document.getElementById("status-indicator");
        const statusLabel = document.getElementById("status-label");
        
        const browserAddressText = document.getElementById("browser-address-text");
        const viewportBlank = document.getElementById("viewport-blank");
        const viewportImg = document.getElementById("viewport-img");
        
        const terminalPane = document.getElementById("terminal-pane");
        const terminalClear = document.getElementById("terminal-clear");

        // UI State tracker
        let sessionUrl = null;

        function addLogLine(tag, text, type = "thought") {
            const line = document.createElement("div");
            line.className = "log-line";
            
            const tagSpan = document.createElement("span");
            tagSpan.className = `log-tag-${type}`;
            tagSpan.textContent = `[${tag.toUpperCase()}]`;
            
            const textSpan = document.createElement("span");
            textSpan.textContent = text;
            
            line.appendChild(tagSpan);
            line.appendChild(textSpan);
            terminalPane.appendChild(line);
            
            // Auto scroll
            terminalPane.scrollTop = terminalPane.scrollHeight;
        }

        function setStatus(status, label) {
            statusIndicator.className = "status-dot " + status;
            statusLabel.textContent = label.toUpperCase();
        }

        function setViewportScreenshot(url) {
            if (url) {
                viewportBlank.style.display = "none";
                viewportImg.src = url + "?t=" + new Date().getTime(); // Prevent cache
                viewportImg.style.display = "block";
            } else {
                viewportImg.style.display = "none";
                viewportBlank.style.display = "flex";
            }
        }

        // 1. Connect Target Web Site
        btnConnect.addEventListener("click", async () => {
            const url = targetUrlInput.value.trim();
            btnConnect.disabled = true;
            btnConnect.innerHTML = `<span class="loader"></span> <span>Connecting...</span>`;
            setStatus("active", "connecting");
            
            addLogLine("system", `Attempting connection to target url: '${url}'...`, "thought");

            try {
                const response = await fetch("/api/connect", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    sessionUrl = data.url;
                    browserAddressText.textContent = data.url;
                    setViewportScreenshot(data.screenshot);
                    
                    setStatus("connected", "connected");
                    btnDisconnect.disabled = false;
                    btnRunTask.disabled = false;
                    
                    addLogLine("system", `Successfully connected: ${data.url}`, "observation");
                } else {
                    throw new Error(data.detail || "Navigation failed.");
                }
            } catch (err) {
                setStatus("error", "error");
                addLogLine("error", `Connection failure: ${err.message}`, "error");
                setViewportScreenshot(null);
            } finally {
                btnConnect.disabled = false;
                btnConnect.innerHTML = `<span>Connect Target Site</span>`;
            }
        });

        // 2. Disconnect Session
        btnDisconnect.addEventListener("click", async () => {
            btnDisconnect.disabled = true;
            try {
                const response = await fetch("/api/disconnect", { method: "POST" });
                if (response.ok) {
                    sessionUrl = null;
                    browserAddressText.textContent = "about:blank";
                    setViewportScreenshot(null);
                    setStatus("standby", "standby");
                    btnRunTask.disabled = true;
                    addLogLine("system", "Session closed and browser cleaned up.", "thought");
                }
            } catch (err) {
                addLogLine("error", `Disconnect error: ${err.message}`, "error");
            } finally {
                btnDisconnect.disabled = true;
            }
        });

        // 3. Launch Agentic Autonomous Loop
        btnRunTask.addEventListener("click", async () => {
            const task = taskDescInput.value.trim();
            const maxSteps = parseInt(taskStepsSelect.value);
            
            if (!task) {
                addLogLine("system", "Warning: Task description cannot be empty.", "error");
                return;
            }

            btnRunTask.disabled = true;
            btnConnect.disabled = true;
            btnDisconnect.disabled = true;
            btnRunTask.innerHTML = `<span class="loader"></span> <span>Running Autopilot...</span>`;
            
            setStatus("active", "running");
            addLogLine("system", `Starting autonomous loop for: '${task}'`, "thought");

            try {
                const response = await fetch("/api/run-task", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ task, max_steps: maxSteps })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // Update latest screenshot
                    setViewportScreenshot(data.screenshot);
                    
                    // Render step-by-step logs returned from the backend agent trace
                    if (data.logs && data.logs.length > 0) {
                        data.logs.forEach(log => {
                            if (log.type === "thought") {
                                addLogLine("thought", log.content, "thought");
                            } else if (log.type === "action") {
                                addLogLine("actuator", log.desc, "action");
                            } else if (log.type === "observation") {
                                const status = log.success ? "Done" : `Failed: ${log.message}`;
                                addLogLine("result", `${log.name} outcome: ${status}`, log.success ? "observation" : "error");
                            }
                        });
                    }
                    
                    if (data.success) {
                        setStatus("connected", "connected");
                        addLogLine("success", `Task completed: ${data.summary}`, "observation");
                    } else {
                        setStatus("error", "failed");
                        addLogLine("failure", `Task stopped: ${data.summary}`, "error");
                    }
                } else {
                    throw new Error(data.detail || "Task execution failed.");
                }
            } catch (err) {
                setStatus("error", "error");
                addLogLine("error", `Task query crash: ${err.message}`, "error");
            } finally {
                btnRunTask.disabled = false;
                btnConnect.disabled = false;
                btnDisconnect.disabled = false;
                btnRunTask.innerHTML = `<span>Launch Agentic Loop</span>`;
            }
        });

        // 4. Clear logs panel
        terminalClear.addEventListener("click", () => {
            terminalPane.innerHTML = "";
            addLogLine("system", "Log console feed cleared.", "thought");
        });
    </script>
</body>
</html>
